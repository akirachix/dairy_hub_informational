<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dairy Hub</title>
  <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700&display=swap" rel="stylesheet" />
   <link href="https://fonts.googleapis.com/css2?family=Albert+Sans&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

 <section id="whyus" class="whyus-section">
    <div class="whyus-header">
      <div class="about-underline"></div>
      <h2><span>Why choose us?</span></h2>
      <p class="whyus-subtitle">All-in-One Dairy Input Platform</p>
    </div>
    <div class="whyus-cards">
      <div class="whyus-card">
        <img src="https://www.ckl.africa/wp-content/uploads/2018/02/CKL-Maclik-PLUS-2.png" alt="Maclik salt" />
        <p class="whyus-card-title">Maclik salt</p>
      </div>
      <div class="whyus-card">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRhOYpnZgOHAKu0Shrr8gI1RA-aDnSoyNv4DQ&s" alt="Milking Machine" />
        <p class="whyus-card-title">Milking Machine</p>
      </div>
      <div class="whyus-card">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTqZok5oaQpJr1aEKlihwZNDbsNeMfXS9qCeQ&s" alt="Animal meal" />
        <p class="whyus-card-title">Animal feeds</p>
      </div>
    </div>
    <div class="whyus-action">
      <a href="#" class="whyus-btn">Buy Now</a>
    </div>
  </section>

  <section id="explore">
    <div class="explore-header">
      <div class="about-underline"></div>
      <h2 id="explore-heading"><span>Explore</span></h2>
    </div>

    <div class="photo-screenshot-container">
      <button class="arrow-btn" aria-label="Previous">&#8592;</button>

      <div class="photo-screenshot">
        <img src="photos/Screenshot from 2025-06-14 19-15-43 (2).png" alt="Photo 1" class="screenshot-photo active" />
        <img src="photos/Screenshot from 2025-06-14 19-15-43 (3).png" alt="Photo 2" class="screenshot-photo" />
        <img src="photos/Screenshot from 2025-06-14 19-15-43 (1).png" alt="Photo 3" class="screenshot-photo" />
      </div>

      <button class="arrow-btn" aria-label="Next">&#8594;</button>
    </div>

    <button class="download-btn">Download</button>
  </section>

 
</body>
</html>
